<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态关联节点图生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .node-rect {
            transition: stroke 0.15s ease, stroke-width 0.15s ease, filter 0.15s ease;
        }
        /* Hover：未选中、非连线预选时显示悬停环 */
        .node-rect.node-hover:not(.node-active):not(.node-linking) {
            stroke: #3b82f6 !important;
            stroke-width: 2.75px !important;
            filter: drop-shadow(0 2px 8px rgba(37, 99, 235, 0.2));
        }
        /* 当前选中（编辑中） */
        .node-rect.node-active {
            stroke: #2563eb !important;
            stroke-width: 4px !important;
            filter: drop-shadow(0 0 0 2px rgba(37, 99, 235, 0.35)) drop-shadow(0 4px 12px rgba(37, 99, 235, 0.2));
        }
        /* 连线模式下的起点预选 */
        .node-rect.node-linking {
            stroke: #f59e0b !important;
            stroke-width: 4px !important;
            stroke-dasharray: 5 4;
            animation: dash 1s linear infinite;
            filter: drop-shadow(0 0 0 2px rgba(245, 158, 11, 0.35));
        }
        @keyframes dash { to { stroke-dashoffset: -8; } }
        /* 默认画布底由主题脚本写入；此处为无 JS 时的回退（官网蓝） */
        .canvas-container { background-color: #F2F5FA; background-image: radial-gradient(#D3DAEB 1px, transparent 1px); background-size: 20px 20px; }
        .canvas-container.link-mode-canvas { cursor: crosshair; }
        svg { cursor: grab; }
        svg:active { cursor: grabbing; }
        .canvas-container.link-mode-canvas svg { cursor: crosshair; }
        .transition-all { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b px-6 py-3 flex justify-between items-center z-10 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-green-600 rounded flex items-center justify-center text-white font-bold">S</div>
            <h1 class="text-xl font-bold text-gray-800">业务策略架构图</h1>
        </div>
        <div class="flex gap-2 flex-wrap items-center justify-end">
            <input type="file" id="import-json-input" accept=".json,application/json" class="hidden" aria-hidden="true">
            <button type="button" onclick="document.getElementById('import-json-input').click()" class="px-4 py-2 border rounded hover:bg-gray-50 text-sm">导入数据</button>
            <button onclick="exportJSON()" class="px-4 py-2 border rounded hover:bg-gray-50 text-sm">导出数据</button>
            <button onclick="downloadSVG()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 text-sm shadow-sm transition-colors">下载 SVG</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-white border-r overflow-y-auto flex flex-col">
            <div class="divide-y divide-gray-100">
            <!-- 节点添加 -->
            <section class="px-4 py-4">
                <h3 class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.14em] mb-2.5">节点</h3>
                <div class="grid grid-cols-2 gap-2 mb-2.5">
                    <button onclick="addNode('main')" class="py-2.5 border border-gray-200 rounded-lg hover:border-green-400 hover:bg-green-50/40 flex flex-col items-center gap-1.5 group transition-all">
                        <div class="w-7 h-7 rounded-full bg-white border-2 border-indigo-900 group-hover:scale-110 transition-transform"></div>
                        <span class="text-[11px] text-gray-600">核心目标</span>
                    </button>
                    <button onclick="addNode('sub')" class="py-2.5 border border-gray-200 rounded-lg hover:border-green-400 hover:bg-green-50/40 flex flex-col items-center gap-1.5 group transition-all">
                        <div class="w-7 h-7 rounded-md bg-white border-2 border-green-500 group-hover:scale-110 transition-transform"></div>
                        <span class="text-[11px] text-gray-600">功能/策略</span>
                    </button>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-xs text-gray-600">连线模式</span>
                    <button type="button" id="btn-link-mode" onclick="toggleLinkMode()" class="px-2.5 py-1 rounded-md text-[11px] font-semibold border transition-colors bg-white text-gray-600 border-gray-200 hover:bg-gray-50">
                        关
                    </button>
                </div>
                <p id="link-mode-hint" class="text-[11px] text-gray-400 mt-2 leading-relaxed hidden">
                    依次点击两个节点即可连线；再次连接会删除。<kbd class="px-1 py-0.5 rounded bg-gray-100 text-gray-600 font-mono text-[10px]">Shift</kbd>+点击同样生效。
                </p>
            </section>

            <!-- 连线默认样式 -->
            <section class="px-4 py-4">
                <h3 class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.14em] mb-2.5">连线默认样式</h3>
                <div class="grid grid-cols-2 gap-2.5 text-xs">
                    <div>
                        <label class="text-gray-500 block mb-1">颜色</label>
                        <input type="color" id="link-default-stroke" value="#009DFF" oninput="updateLinkDefaults('stroke', this.value)" class="h-8 w-full border rounded cursor-pointer border-gray-200">
                    </div>
                    <div>
                        <label class="text-gray-500 block mb-1">线宽</label>
                        <input type="number" id="link-default-width" min="0.5" max="12" step="0.5" value="1.5" oninput="updateLinkDefaults('strokeWidth', this.value)" class="w-full h-8 border rounded-md px-2 border-gray-200">
                    </div>
                    <div class="col-span-2">
                        <div class="flex justify-between mb-1">
                            <label class="text-gray-500">不透明度</label>
                            <span id="link-default-opacity-val" class="text-green-600 font-mono">0.55</span>
                        </div>
                        <input type="range" id="link-default-opacity" min="0.1" max="1" step="0.05" value="0.55" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600" oninput="updateLinkDefaults('strokeOpacity', this.value)">
                    </div>
                </div>
            </section>

            <!-- 选中连线编辑 -->
            <section id="link-editor-panel" class="hidden px-4 py-4 bg-amber-50/40">
                <h3 class="text-[11px] font-semibold text-amber-700 uppercase tracking-[0.14em] mb-2.5">编辑选中连线</h3>
                <div class="grid grid-cols-2 gap-2.5 text-xs">
                    <div>
                        <label class="text-gray-600 block mb-1">颜色</label>
                        <input type="color" id="link-edit-stroke" oninput="updateActiveLink('stroke', this.value)" class="h-8 w-full border rounded cursor-pointer border-gray-200">
                    </div>
                    <div>
                        <label class="text-gray-600 block mb-1">线宽</label>
                        <input type="number" id="link-edit-width" min="0.5" max="16" step="0.5" oninput="updateActiveLink('strokeWidth', this.value)" class="w-full h-8 border rounded-md px-2 border-gray-200">
                    </div>
                    <div class="col-span-2">
                        <div class="flex justify-between mb-1">
                            <label class="text-gray-600">不透明度</label>
                            <span id="link-edit-opacity-val" class="text-amber-700 font-mono">0.6</span>
                        </div>
                        <input type="range" id="link-edit-opacity" min="0.1" max="1" step="0.05" oninput="updateActiveLink('strokeOpacity', this.value)" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-amber-500">
                    </div>
                </div>
                <button type="button" onclick="deleteActiveLink()" class="mt-3 w-full py-1.5 bg-white border border-red-200 text-red-600 rounded-md text-xs font-medium hover:bg-red-50">删除此连线</button>
            </section>

            <!-- 选中节点编辑 -->
            <section id="editor-panel" class="hidden px-4 py-4 bg-green-50/30">
                <h3 class="text-[11px] font-semibold text-green-700 uppercase tracking-[0.14em] mb-2.5">编辑选中节点</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-[11px] text-gray-500 block mb-1">文字内容 <span class="text-gray-400">（空格换行）</span></label>
                        <textarea id="node-text" oninput="updateActiveNode()" class="w-full border rounded-md p-2 text-xs h-16 focus:ring-2 focus:ring-green-200 outline-none transition-all border-gray-200"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-2.5 text-xs">
                        <div>
                            <label class="text-[11px] text-gray-500 block mb-1">半径</label>
                            <input type="number" id="node-radius" oninput="updateActiveNode()" class="w-full h-8 border rounded-md px-2 border-gray-200">
                        </div>
                        <div>
                            <label class="text-[11px] text-gray-500 block mb-1">字号 (px)</label>
                            <input type="number" id="node-font-size" min="8" max="48" step="1" oninput="updateActiveNode()" class="w-full h-8 border rounded-md px-2 border-gray-200" title="留空则使用类别默认字号">
                        </div>
                        <div>
                            <label class="text-[11px] text-gray-500 block mb-1">描边色</label>
                            <input type="color" id="node-stroke" oninput="updateActiveNode()" class="w-full h-8 border rounded cursor-pointer border-gray-200">
                        </div>
                        <div>
                            <label class="text-[11px] text-gray-500 block mb-1">填充色</label>
                            <input type="color" id="node-color" oninput="updateActiveNode()" class="w-full h-8 border rounded cursor-pointer border-gray-200">
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="resetNodeStyle()" class="flex-1 py-1.5 bg-white border border-gray-200 text-gray-600 rounded-md text-xs font-medium hover:bg-gray-50 transition-colors">恢复默认</button>
                        <button onclick="deleteActiveElement()" class="flex-1 py-1.5 bg-white border border-red-200 text-red-600 rounded-md text-xs font-medium hover:bg-red-50 transition-colors">删除节点</button>
                    </div>
                </div>
            </section>

            <!-- 画布主题 -->
            <section class="px-4 py-4">
                <h3 class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.14em] mb-2.5">画布主题</h3>
                <select id="canvas-theme-select" class="w-full h-8 border rounded-md px-2 text-xs border-gray-200 bg-white" onchange="applyCanvasTheme(this.value)">
                    <option value="brandBlue">官网蓝</option>
                    <option value="lightBlue">轻蓝区段</option>
                    <option value="greenGrowth">绿意增长</option>
                    <option value="purpleFocus">紫调焦点</option>
                </select>
            </section>

            <!-- 布局引擎 -->
            <section class="px-4 py-4">
                <h3 class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.14em] mb-3">布局引擎</h3>
                <div class="space-y-3 text-xs">
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-gray-500">离散引力</label>
                            <span id="val-charge" class="text-green-600 font-mono">-500</span>
                        </div>
                        <input type="range" id="sim-charge" min="-2000" max="-100" value="-500" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600" oninput="updateSimulationParam('charge', this.value)">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-gray-500">连线强度</label>
                            <span id="val-link" class="text-green-600 font-mono">0.08</span>
                        </div>
                        <input type="range" id="sim-link" min="0" max="0.5" step="0.01" value="0.08" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600" oninput="updateSimulationParam('link', this.value)">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-gray-500">碰撞半径</label>
                            <span id="val-collide" class="text-green-600 font-mono">25</span>
                        </div>
                        <input type="range" id="sim-collide" min="0" max="100" value="25" class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-green-600" oninput="updateSimulationParam('collide', this.value)">
                    </div>
                </div>
            </section>

            <!-- 类别样式 -->
            <section class="px-4 py-4">
                <h3 class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.14em] mb-2.5">类别样式</h3>
                <div class="space-y-2.5 text-xs">
                    <div class="rounded-lg border border-gray-100 p-2.5 space-y-1.5">
                        <p class="font-semibold text-indigo-900 mb-1 flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-full bg-indigo-900"></span>
                            核心目标
                        </p>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">描边</span>
                            <input type="color" id="cat-main-stroke" value="#1D326C" oninput="updateCategoryConfig('main', 'stroke', this.value)" class="h-6 w-9 border border-gray-200 rounded cursor-pointer">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">填充</span>
                            <input type="color" id="cat-main-fill" value="#ffffff" oninput="updateCategoryConfig('main', 'fill', this.value)" class="h-6 w-9 border border-gray-200 rounded cursor-pointer">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">半径</span>
                            <input type="number" id="cat-main-r" value="75" oninput="updateCategoryConfig('main', 'r', this.value)" class="w-14 h-6 border border-gray-200 rounded px-1.5 text-right">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">字号</span>
                            <input type="number" id="cat-main-font" min="8" max="48" step="1" value="12" oninput="updateCategoryConfig('main', 'fontSize', this.value)" class="w-14 h-6 border border-gray-200 rounded px-1.5 text-right">
                        </div>
                    </div>
                    <div class="rounded-lg border border-gray-100 p-2.5 space-y-1.5">
                        <p class="font-semibold text-green-700 mb-1 flex items-center gap-1.5">
                            <span class="w-2 h-2 rounded-sm bg-green-600"></span>
                            功能/策略
                        </p>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">描边</span>
                            <input type="color" id="cat-sub-stroke" value="#0080FF" oninput="updateCategoryConfig('sub', 'stroke', this.value)" class="h-6 w-9 border border-gray-200 rounded cursor-pointer">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">填充</span>
                            <input type="color" id="cat-sub-fill" value="#ffffff" oninput="updateCategoryConfig('sub', 'fill', this.value)" class="h-6 w-9 border border-gray-200 rounded cursor-pointer">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">半径</span>
                            <input type="number" id="cat-sub-r" value="45" oninput="updateCategoryConfig('sub', 'r', this.value)" class="w-14 h-6 border border-gray-200 rounded px-1.5 text-right">
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-gray-500">字号</span>
                            <input type="number" id="cat-sub-font" min="8" max="48" step="1" value="12" oninput="updateCategoryConfig('sub', 'fontSize', this.value)" class="w-14 h-6 border border-gray-200 rounded px-1.5 text-right">
                        </div>
                    </div>
                </div>
            </section>
            </div>
        </aside>

        <div class="flex-1 relative canvas-container overflow-hidden" id="canvas-wrapper">
            <svg id="main-svg" class="w-full h-full"></svg>
            <div class="absolute bottom-6 right-6 flex flex-col gap-2 bg-white p-1.5 rounded-xl shadow-xl border border-gray-100">
                <button onclick="zoomAdjust(1.3)" class="w-10 h-10 hover:bg-gray-50 flex items-center justify-center rounded-lg font-bold text-gray-600 text-xl">+</button>
                <div class="h-px bg-gray-100 mx-2"></div>
                <button onclick="zoomAdjust(0.7)" class="w-10 h-10 hover:bg-gray-50 flex items-center justify-center rounded-lg font-bold text-gray-600 text-xl">−</button>
            </div>
        </div>
    </main>

    <script>
        /**
         * 画布主题（Official Site Style Guide — 与 style-guide 文档对齐）
         * main/sub：类别默认描边与填充；link：新建连线默认样式；canvas：区段背景 + 点阵色
         */
        const CANVAS_THEMES = {
            brandBlue: {
                label: "官网蓝",
                canvasBg: "#F2F5FA",
                canvasDot: "#D3DAEB",
                main: { stroke: "#1D326C", fill: "#FFFFFF" },
                sub: { stroke: "#0080FF", fill: "#FFFFFF" },
                link: { stroke: "#009DFF", strokeOpacity: 0.55, strokeWidth: 1.5 }
            },
            lightBlue: {
                label: "轻蓝区段",
                canvasBg: "#E5F4FF",
                canvasDot: "#B8D4F0",
                main: { stroke: "#235293", fill: "#FFFFFF" },
                sub: { stroke: "#0080FF", fill: "#FFFFFF" },
                link: { stroke: "#009DFF", strokeOpacity: 0.55, strokeWidth: 1.5 }
            },
            greenGrowth: {
                label: "绿意增长",
                canvasBg: "#EBF3EF",
                canvasDot: "#C5E0D6",
                main: { stroke: "#18544F", fill: "#FFFFFF" },
                sub: { stroke: "#00BA5D", fill: "#FFFFFF" },
                link: { stroke: "#23CF6D", strokeOpacity: 0.55, strokeWidth: 1.5 }
            },
            purpleFocus: {
                label: "紫调焦点",
                canvasBg: "#F0EEFF",
                canvasDot: "#D4CCF0",
                main: { stroke: "#3A3069", fill: "#FFFFFF" },
                sub: { stroke: "#2C3852", fill: "#EDF1FA" },
                link: { stroke: "#7E41FF", strokeOpacity: 0.45, strokeWidth: 1.5 }
            }
        };

        let activeThemeId = "brandBlue";

        // 全局类别配置（与 brandBlue 一致；切换主题时由 applyCanvasTheme 更新描边/填充）
        const categoryConfig = {
            main: { r: 75, stroke: "#1D326C", fill: "#FFFFFF", strokeWidth: 3, fontSize: 12 },
            sub: { r: 45, stroke: "#0080FF", fill: "#FFFFFF", strokeWidth: 1.5, fontSize: 12 }
        };

        function clampFontSize(px) {
            const n = Number(px);
            if (!Number.isFinite(n)) return 12;
            return Math.min(48, Math.max(8, Math.round(n * 10) / 10));
        }

        /** 节点最终字号：单节点覆盖 > 类别默认 */
        function effectiveNodeFontSize(d) {
            const def = categoryConfig[d.type].fontSize;
            const base = def != null && def > 0 ? clampFontSize(def) : 12;
            if (d.fontSize != null && Number.isFinite(d.fontSize)) return clampFontSize(d.fontSize);
            return base;
        }

        function measureFontString(px) {
            return `500 ${px}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif`;
        }

        // 布局引擎参数
        let simulationParams = {
            charge: -500,
            link: 0.08,
            collidePadding: 25
        };

        /** 新建连线默认样式（可导出；与当前主题同步） */
        let linkDefaults = {
            stroke: "#009DFF",
            strokeOpacity: 0.55,
            strokeWidth: 1.5
        };

        let activeLink = null;

        // 初始数据（按示意图填充）
        let nodes = [
            { id: 101, text: "优质客户体验", type: "main" },
            { id: 102, text: "始终聚焦云计算 坚持产品驱动", type: "main" },
            { id: 103, text: "真正降本增效 真正达成共赢", type: "main" },
            { id: 1, text: "数据库支撑", type: "sub" },
            { id: 2, text: "易于使用", type: "sub" },
            { id: 3, text: "交付专业快捷", type: "sub", r_override: 55 },
            { id: 4, text: "生产场景", type: "sub" },
            { id: 5, text: "稳定可靠", type: "sub" },
            { id: 6, text: "专注行业应用", type: "sub" },
            { id: 7, text: "客户可自维护", type: "sub" },
            { id: 8, text: "模块化产品", type: "sub" },
            { id: 9, text: "不急功近利", type: "sub" },
            { id: 10, text: "不参与低价、价值型销售", type: "sub" },
            { id: 11, text: "满足绝大多数规模客户", type: "sub" },
            { id: 12, text: "文档、接口全开放 便于客户运维与集成", type: "sub" },
            { id: 13, text: "国内最接近 对标VMware的全栈产品", type: "sub" },
            { id: 14, text: "使得公司良性、稳定增长", type: "sub" },
            { id: 15, text: "定位、解决问题效率高", type: "sub" },
            { id: 17, text: "V2V、巡检、升级完全可以自主化", type: "sub" },
            { id: 18, text: "不扔低价内卷", type: "sub" },
            { id: 19, text: "帮用户避坑", type: "sub" },
            { id: 21, text: "真正异构集中存储的产品能力", type: "sub" },
            { id: 22, text: "从场景入手，与客户共成长", type: "sub" }
        ];

        let links = [
            { source: 101, target: 1 }, { source: 101, target: 2 }, { source: 101, target: 3 },
            { source: 101, target: 6 }, { source: 101, target: 7 }, { source: 101, target: 9 },
            { source: 102, target: 12 }, { source: 102, target: 13 }, { source: 102, target: 15 },
            { source: 102, target: 17 }, { source: 102, target: 9 },
            { source: 103, target: 21 }, { source: 103, target: 22 }, { source: 103, target: 10 },
            { source: 103, target: 18 }, { source: 101, target: 102 }, { source: 102, target: 103 }
        ];

        let activeNode = null;
        let linkingNode = null;
        /** 连线模式：点击两点连线；关闭后仍可用 Shift+点击 */
        let linkMode = false;
        /** 悬停节点 id（用于 hover 样式，与选中区分） */
        let hoveredNodeId = null;

        const svg = d3.select("#main-svg");
        const container = svg.append("g");
        const zoom = d3.zoom().scaleExtent([0.1, 5]).on("zoom", (e) => container.attr("transform", e.transform));
        svg.call(zoom);

        const _measureCanvas = document.createElement("canvas");
        const _measureCtx = _measureCanvas.getContext("2d");

        function splitTextLines(text) {
            const raw = (text || "").split(/\s+/).filter(Boolean);
            const lines = raw.flatMap(s => s.match(/.{1,9}/g) || []);
            return lines.length ? lines : [""];
        }

        /**
         * 按文字内容计算节点宽高与碰撞半径；写入 d.layoutW / d.layoutH / d.collideR
         */
        function computeNodeLayout(d) {
            const conf = categoryConfig[d.type];
            const isMain = d.type === "main";
            const fs = effectiveNodeFontSize(d);
            const padX = Math.round(10 + fs * 0.35);
            const padY = Math.round(8 + fs * 0.2);
            const lineHeightPx = fs * 1.2;
            const lines = splitTextLines(d.text);
            _measureCtx.font = measureFontString(fs);
            let maxLineW = 0;
            lines.forEach(line => {
                const w = _measureCtx.measureText(line).width;
                if (w > maxLineW) maxLineW = w;
            });
            const baseR = d.r_override != null && !Number.isNaN(d.r_override) ? d.r_override : conf.r;
            const minByType = isMain ? baseR * 2 : baseR * 2.2;
            let width = Math.max(maxLineW + padX * 2, minByType);
            let height = Math.max(lines.length * lineHeightPx + padY * 2, isMain ? width : baseR * 1.3);
            if (isMain) {
                const side = Math.max(width, height, baseR * 2);
                width = side;
                height = side;
            }
            d.layoutW = width;
            d.layoutH = height;
            d.collideR = Math.hypot(width / 2, height / 2) + simulationParams.collidePadding;
            return d;
        }

        function linkPreferredDistance(link) {
            const s = link.source;
            const t = link.target;
            if (!s || !t || s.layoutW == null) return 200;
            const rs = Math.hypot(s.layoutW / 2, s.layoutH / 2);
            const rt = Math.hypot(t.layoutW / 2, t.layoutH / 2);
            return Math.min(420, 90 + rs + rt + 40);
        }

        function viewportCenter() {
            const el = document.getElementById("canvas-wrapper");
            const w = el ? el.clientWidth : window.innerWidth;
            const h = el ? el.clientHeight : window.innerHeight;
            return { x: w / 2, y: h / 2 };
        }

        function zoomAdjust(factor) {
            svg.transition().duration(300).call(zoom.scaleBy, factor);
        }

        nodes.forEach(computeNodeLayout);

        const cx = viewportCenter();
        let simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(linkPreferredDistance).strength(simulationParams.link))
            .force("charge", d3.forceManyBody().strength(simulationParams.charge))
            .force("center", d3.forceCenter(cx.x, cx.y))
            .force("x", d3.forceX(cx.x).strength(0.06))
            .force("y", d3.forceY(cx.y).strength(0.06))
            .force("collide", d3.forceCollide().radius(d => d.collideR != null ? d.collideR : (d.r_override || categoryConfig[d.type].r) + simulationParams.collidePadding))
            .on("tick", ticked);

        let linkGroups = container.append("g").attr("class", "links").selectAll("g.link-group");
        let nodeElements = container.append("g").attr("class", "nodes").selectAll(".node-group");

        function refreshNodeHoverStyles() {
            nodeElements.each(function(d) {
                d3.select(this).select("rect").classed("node-hover", hoveredNodeId === d.id);
            });
        }

        function linkKey(d) {
            const s = typeof d.source === "object" ? d.source.id : d.source;
            const t = typeof d.target === "object" ? d.target.id : d.target;
            return `${Math.min(s, t)}-${Math.max(s, t)}`;
        }

        function render() {
            linkGroups = linkGroups.data(links, linkKey);
            linkGroups.exit().remove();
            const linkEnter = linkGroups.enter().append("g")
                .attr("class", "link-group")
                .style("cursor", "pointer");
            linkEnter.append("line")
                .attr("class", "link-hit")
                .attr("stroke", "transparent")
                .attr("stroke-width", 16)
                .attr("pointer-events", "all")
                .on("click", handleLinkClick);
            linkEnter.append("line")
                .attr("class", "link-line")
                .attr("pointer-events", "none")
                .attr("stroke-linecap", "round");
            linkGroups = linkEnter.merge(linkGroups);

            linkGroups.each(function(d) {
                const stroke = d.stroke || linkDefaults.stroke;
                const op = d.strokeOpacity != null ? d.strokeOpacity : linkDefaults.strokeOpacity;
                const sw = d.strokeWidth != null ? d.strokeWidth : linkDefaults.strokeWidth;
                const isSel = activeLink === d;
                d3.select(this).select(".link-line")
                    .attr("stroke", stroke)
                    .attr("stroke-opacity", isSel ? Math.min(1, op + 0.15) : op)
                    .attr("stroke-width", isSel ? sw + 2.5 : sw)
                    .attr("stroke-dasharray", isSel ? "8 5" : "none");
            });

            nodeElements = nodeElements.data(nodes, d => d.id);
            nodeElements.exit().remove();

            const nodeEnter = nodeElements.enter().append("g")
                .attr("class", "node-group")
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("click", handleNodeClick);

            nodeEnter.append("rect").attr("class", "node-rect");

            nodeEnter.append("text")
                .attr("text-anchor", "middle")
                .attr("dominant-baseline", "middle")
                .attr("class", "pointer-events-none select-none font-medium");

            nodeElements = nodeEnter.merge(nodeElements);

            nodeElements
                .on("mouseenter", function(ev, d) {
                    hoveredNodeId = d.id;
                    refreshNodeHoverStyles();
                })
                .on("mouseleave", function(ev, d) {
                    if (hoveredNodeId === d.id) hoveredNodeId = null;
                    refreshNodeHoverStyles();
                });

            nodeElements.each(function(d) {
                const conf = categoryConfig[d.type];
                computeNodeLayout(d);
                const stroke = d.stroke_override || conf.stroke;
                const fill = d.fill_override || conf.fill;

                const group = d3.select(this);
                const rect = group.select("rect");
                const text = group.select("text");

                const isMain = d.type === "main";
                const width = d.layoutW;
                const height = d.layoutH;
                const rx = isMain ? width / 2 : 8;

                rect.attr("width", width)
                    .attr("height", height)
                    .attr("x", -width / 2)
                    .attr("y", -height / 2)
                    .attr("rx", rx)
                    .attr("fill", fill)
                    .attr("stroke", stroke)
                    .attr("stroke-width", isMain ? 3 : 1.5)
                    .attr("class", "node-rect")
                    .classed("transition-all", true)
                    .classed("cursor-pointer", true)
                    .classed("shadow-sm", true)
                    .classed("node-active", !!(activeNode && d.id === activeNode.id))
                    .classed("node-linking", !!(linkingNode && d.id === linkingNode.id))
                    .classed("node-hover", hoveredNodeId === d.id);

                const fs = effectiveNodeFontSize(d);
                text.attr("fill", stroke)
                    .attr("font-size", fs)
                    .attr("font-weight", "500");

                text.selectAll("tspan").remove();
                const lines = splitTextLines(d.text);
                lines.forEach((line, i) => {
                    text.append("tspan")
                        .attr("x", 0)
                        .attr("dy", i === 0 ? `-${(lines.length - 1) * 0.6}em` : "1.2em")
                        .text(line);
                });
            });

            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.force("link").distance(linkPreferredDistance);
            simulation.force("collide").radius(d => d.collideR);
            const c = viewportCenter();
            simulation.force("center").x(c.x).y(c.y);
            simulation.force("x").x(c.x);
            simulation.force("y").y(c.y);
            simulation.alpha(0.1).restart();
        }

        function ticked() {
            linkGroups.each(function(d) {
                const x1 = d.source.x, y1 = d.source.y, x2 = d.target.x, y2 = d.target.y;
                const g = d3.select(this);
                g.select(".link-hit").attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2);
                g.select(".link-line").attr("x1", x1).attr("y1", y1).attr("x2", x2).attr("y2", y2);
            });
            nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
        }

        function applyCanvasTheme(themeId, opts = {}) {
            const t = CANVAS_THEMES[themeId];
            if (!t) return;
            activeThemeId = themeId;
            const sel = document.getElementById("canvas-theme-select");
            if (sel) sel.value = themeId;
            categoryConfig.main.stroke = t.main.stroke;
            categoryConfig.main.fill = t.main.fill;
            categoryConfig.sub.stroke = t.sub.stroke;
            categoryConfig.sub.fill = t.sub.fill;
            linkDefaults.stroke = t.link.stroke;
            linkDefaults.strokeOpacity = t.link.strokeOpacity;
            linkDefaults.strokeWidth = t.link.strokeWidth;
            const wrap = document.getElementById("canvas-wrapper");
            if (wrap) {
                wrap.style.backgroundColor = t.canvasBg;
                wrap.style.backgroundImage = `radial-gradient(${t.canvasDot} 1px, transparent 1px)`;
                wrap.style.backgroundSize = "20px 20px";
            }
            syncCategoryInputsFromConfig();
            syncLinkDefaultInputs();
            if (!opts.skipRender) render();
        }

        function syncCategoryInputsFromConfig() {
            document.getElementById("cat-main-stroke").value = categoryConfig.main.stroke;
            document.getElementById("cat-main-fill").value = categoryConfig.main.fill;
            document.getElementById("cat-main-r").value = categoryConfig.main.r;
            document.getElementById("cat-main-font").value = categoryConfig.main.fontSize != null ? categoryConfig.main.fontSize : 12;
            document.getElementById("cat-sub-stroke").value = categoryConfig.sub.stroke;
            document.getElementById("cat-sub-fill").value = categoryConfig.sub.fill;
            document.getElementById("cat-sub-r").value = categoryConfig.sub.r;
            document.getElementById("cat-sub-font").value = categoryConfig.sub.fontSize != null ? categoryConfig.sub.fontSize : 12;
        }

        function syncSimulationInputsFromParams() {
            document.getElementById("sim-charge").value = String(simulationParams.charge);
            document.getElementById("val-charge").textContent = String(simulationParams.charge);
            document.getElementById("sim-link").value = String(simulationParams.link);
            document.getElementById("val-link").textContent = String(simulationParams.link);
            document.getElementById("sim-collide").value = String(simulationParams.collidePadding);
            document.getElementById("val-collide").textContent = String(simulationParams.collidePadding);
            simulation.force("charge").strength(simulationParams.charge);
            simulation.force("link").strength(simulationParams.link);
        }

        function syncLinkDefaultInputs() {
            document.getElementById("link-default-stroke").value = linkDefaults.stroke;
            document.getElementById("link-default-width").value = String(linkDefaults.strokeWidth);
            document.getElementById("link-default-opacity").value = String(linkDefaults.strokeOpacity);
            document.getElementById("link-default-opacity-val").textContent = String(linkDefaults.strokeOpacity);
        }

        function fillLinkEditPanel(d) {
            document.getElementById("link-edit-stroke").value = d.stroke || linkDefaults.stroke;
            const sw = d.strokeWidth != null ? d.strokeWidth : linkDefaults.strokeWidth;
            document.getElementById("link-edit-width").value = String(sw);
            const op = d.strokeOpacity != null ? d.strokeOpacity : linkDefaults.strokeOpacity;
            document.getElementById("link-edit-opacity").value = String(op);
            document.getElementById("link-edit-opacity-val").textContent = String(op);
        }

        function updateLinkDefaults(prop, value) {
            if (prop === "strokeWidth") linkDefaults.strokeWidth = parseFloat(value);
            else if (prop === "strokeOpacity") {
                linkDefaults.strokeOpacity = parseFloat(value);
                document.getElementById("link-default-opacity-val").textContent = value;
            } else linkDefaults.stroke = value;
            render();
        }

        function updateActiveLink(prop, value) {
            if (!activeLink) return;
            if (prop === "strokeWidth") activeLink.strokeWidth = parseFloat(value);
            else if (prop === "strokeOpacity") {
                activeLink.strokeOpacity = parseFloat(value);
                document.getElementById("link-edit-opacity-val").textContent = value;
            } else activeLink.stroke = value;
            render();
        }

        function deleteActiveLink() {
            if (!activeLink) return;
            links = links.filter(l => l !== activeLink);
            activeLink = null;
            document.getElementById("link-editor-panel").classList.add("hidden");
            render();
        }

        function handleLinkClick(e, d) {
            e.stopPropagation();
            activeNode = null;
            linkingNode = null;
            hoveredNodeId = null;
            activeLink = d;
            document.getElementById("editor-panel").classList.add("hidden");
            document.getElementById("link-editor-panel").classList.remove("hidden");
            fillLinkEditPanel(d);
            render();
        }

        function applyImportedData(data) {
            if (!data || !Array.isArray(data.nodes)) {
                alert("导入失败：文件需包含 nodes 数组。");
                return;
            }
            if (data.themeId && CANVAS_THEMES[data.themeId]) {
                applyCanvasTheme(data.themeId, { skipRender: true });
            }
            if (data.config) {
                if (data.config.main) Object.assign(categoryConfig.main, data.config.main);
                if (data.config.sub) Object.assign(categoryConfig.sub, data.config.sub);
            }
            if (data.simulationParams) Object.assign(simulationParams, data.simulationParams);
            if (data.linkDefaults) Object.assign(linkDefaults, data.linkDefaults);

            nodes = data.nodes.map(n => ({
                id: n.id,
                text: n.text != null ? n.text : "",
                type: n.type === "main" ? "main" : "sub",
                x: n.x,
                y: n.y,
                r_override: n.r_override,
                fill_override: n.fill_override,
                stroke_override: n.stroke_override,
                fontSize: n.fontSize != null && Number.isFinite(n.fontSize) ? clampFontSize(n.fontSize) : undefined
            }));

            const nodeIds = new Set(nodes.map(n => n.id));
            links = (data.links || []).map(l => ({
                source: l.source,
                target: l.target,
                stroke: l.stroke,
                strokeOpacity: l.strokeOpacity,
                strokeWidth: l.strokeWidth
            })).filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

            activeNode = null;
            activeLink = null;
            linkingNode = null;
            hoveredNodeId = null;
            document.getElementById("editor-panel").classList.add("hidden");
            document.getElementById("link-editor-panel").classList.add("hidden");

            syncCategoryInputsFromConfig();
            syncSimulationInputsFromParams();
            syncLinkDefaultInputs();

            const c = viewportCenter();
            nodes.forEach(n => {
                if (n.x == null || n.y == null || Number.isNaN(n.x) || Number.isNaN(n.y)) {
                    n.x = c.x + (Math.random() - 0.5) * 100;
                    n.y = c.y + (Math.random() - 0.5) * 100;
                }
                n.vx = 0;
                n.vy = 0;
            });

            nodes.forEach(computeNodeLayout);

            simulation.nodes(nodes);
            simulation.force("link").links(links);
            simulation.force("link").distance(linkPreferredDistance);
            simulation.force("collide").radius(d => d.collideR);
            simulation.alpha(0.85).restart();
            render();
        }

        function toggleLinkMode() {
            linkMode = !linkMode;
            if (!linkMode) {
                linkingNode = null;
            }
            updateLinkModeUI();
            render();
        }

        function updateLinkModeUI() {
            const btn = document.getElementById("btn-link-mode");
            const hint = document.getElementById("link-mode-hint");
            const wrap = document.getElementById("canvas-wrapper");
            if (!btn || !hint || !wrap) return;
            if (linkMode) {
                btn.textContent = "开";
                btn.className = "px-2.5 py-1 rounded-md text-[11px] font-semibold border transition-colors bg-green-600 text-white border-green-600 hover:bg-green-700";
                hint.classList.remove("hidden");
                wrap.classList.add("link-mode-canvas");
            } else {
                btn.textContent = "关";
                btn.className = "px-2.5 py-1 rounded-md text-[11px] font-semibold border transition-colors bg-white text-gray-600 border-gray-200 hover:bg-gray-50";
                hint.classList.add("hidden");
                wrap.classList.remove("link-mode-canvas");
            }
        }

        function handleNodeClick(e, d) {
            e.stopPropagation();
            if (linkMode || e.shiftKey) {
                if (!linkingNode) { linkingNode = d; }
                else if (linkingNode.id === d.id) { linkingNode = null; }
                else { createLink(linkingNode, d); linkingNode = null; }
                render();
                return;
            }
            activeNode = d;
            activeLink = null;
            linkingNode = null;
            document.getElementById("link-editor-panel").classList.add("hidden");
            document.getElementById("editor-panel").classList.remove("hidden");
            document.getElementById("node-text").value = d.text;
            document.getElementById("node-radius").value = d.r_override || categoryConfig[d.type].r;
            document.getElementById("node-font-size").value =
                (d.fontSize != null && Number.isFinite(d.fontSize)) ? String(clampFontSize(d.fontSize)) : "";
            document.getElementById("node-stroke").value = d.stroke_override || categoryConfig[d.type].stroke;
            document.getElementById("node-color").value = d.fill_override || categoryConfig[d.type].fill;
            render();
        }

        function updateActiveNode() {
            if (!activeNode) return;
            activeNode.text = document.getElementById("node-text").value;
            const rv = parseInt(document.getElementById("node-radius").value, 10);
            activeNode.r_override = Number.isFinite(rv) ? rv : undefined;
            const fontRaw = document.getElementById("node-font-size").value.trim();
            if (fontRaw === "") {
                delete activeNode.fontSize;
            } else {
                const fv = parseFloat(fontRaw);
                if (Number.isFinite(fv)) activeNode.fontSize = clampFontSize(fv);
                else delete activeNode.fontSize;
            }
            activeNode.stroke_override = document.getElementById("node-stroke").value;
            activeNode.fill_override = document.getElementById("node-color").value;
            render();
        }

        function resetNodeStyle() {
            if (!activeNode) return;
            delete activeNode.r_override;
            delete activeNode.fill_override;
            delete activeNode.stroke_override;
            delete activeNode.fontSize;
            document.getElementById("node-radius").value = categoryConfig[activeNode.type].r;
            document.getElementById("node-font-size").value = "";
            document.getElementById("node-stroke").value = categoryConfig[activeNode.type].stroke;
            document.getElementById("node-color").value = categoryConfig[activeNode.type].fill;
            render();
        }

        function updateCategoryConfig(type, prop, value) {
            if (prop === "r") categoryConfig[type][prop] = parseInt(value, 10);
            else if (prop === "fontSize") categoryConfig[type][prop] = clampFontSize(value);
            else categoryConfig[type][prop] = value;
            render();
        }

        // 核心布局引擎参数更新
        function updateSimulationParam(type, value) {
            const numVal = parseFloat(value);
            document.getElementById(`val-${type}`).innerText = value;
            
            if (type === 'charge') {
                simulationParams.charge = numVal;
                simulation.force("charge").strength(numVal);
            } else if (type === 'link') {
                simulationParams.link = numVal;
                simulation.force("link").strength(numVal);
            } else if (type === 'collide') {
                simulationParams.collidePadding = numVal;
                nodes.forEach(computeNodeLayout);
                simulation.force("collide").radius(d => d.collideR);
            }
            
            simulation.alpha(0.3).restart();
        }

        function addNode(type) {
            const newNode = {
                id: Date.now(),
                text: "新条目",
                type: type,
                x: window.innerWidth / 2,
                y: window.innerHeight / 2
            };
            nodes.push(newNode);
            render();
        }

        function createLink(source, target) {
            const exists = links.find(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return (s === source.id && t === target.id) || (s === target.id && t === source.id);
            });
            if (exists) { links = links.filter(l => l !== exists); }
            else {
                links.push({
                    source: source,
                    target: target,
                    stroke: linkDefaults.stroke,
                    strokeOpacity: linkDefaults.strokeOpacity,
                    strokeWidth: linkDefaults.strokeWidth
                });
            }
            render();
        }

        function deleteActiveElement() {
            if (!activeNode) return;
            links = links.filter(l => (l.source.id || l.source) !== activeNode.id && (l.target.id || l.target) !== activeNode.id);
            nodes = nodes.filter(n => n.id !== activeNode.id);
            activeNode = null;
            document.getElementById("editor-panel").classList.add("hidden");
            render();
        }

        function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
        function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
        function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }

        function exportJSON() {
            const data = {
                version: 1,
                exportTime: new Date().toISOString(),
                nodes: nodes.map(n => ({
                    id: n.id,
                    text: n.text,
                    type: n.type,
                    x: n.x,
                    y: n.y,
                    r_override: n.r_override,
                    fill_override: n.fill_override,
                    stroke_override: n.stroke_override,
                    fontSize: n.fontSize
                })),
                links: links.map(l => ({
                    source: typeof l.source === "object" ? l.source.id : l.source,
                    target: typeof l.target === "object" ? l.target.id : l.target,
                    stroke: l.stroke,
                    strokeOpacity: l.strokeOpacity,
                    strokeWidth: l.strokeWidth
                })),
                config: JSON.parse(JSON.stringify(categoryConfig)),
                simulationParams: { ...simulationParams },
                linkDefaults: { ...linkDefaults },
                themeId: activeThemeId
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = "business_map.json"; a.click();
        }

        function downloadSVG() {
            const svgEl = document.getElementById("main-svg").cloneNode(true);
            const bbox = container.node().getBBox();
            svgEl.setAttribute("viewBox", `${bbox.x - 50} ${bbox.y - 50} ${bbox.width + 100} ${bbox.height + 100}`);
            const serializer = new XMLSerializer();
            const source = '<?xml version="1.0" standalone="no"?>\r\n' + serializer.serializeToString(svgEl);
            const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(source);
            const a = document.createElement("a");
            a.href = url; a.download = "strategy_map.svg"; a.click();
        }

        svg.on("click", (e) => {
            if (e.target.tagName === "svg") {
                activeNode = null;
                activeLink = null;
                linkingNode = null;
                hoveredNodeId = null;
                document.getElementById("editor-panel").classList.add("hidden");
                document.getElementById("link-editor-panel").classList.add("hidden");
                render();
            }
        });

        document.getElementById("import-json-input").addEventListener("change", function(ev) {
            const file = ev.target.files && ev.target.files[0];
            const inputEl = document.getElementById("import-json-input");
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    applyImportedData(data);
                } catch (err) {
                    alert("导入失败：无法解析 JSON 文件。");
                }
                inputEl.value = "";
            };
            reader.readAsText(file, "UTF-8");
        });

        window.addEventListener("keydown", (e) => {
            if (e.key !== "Escape") return;
            linkingNode = null;
            activeLink = null;
            hoveredNodeId = null;
            document.getElementById("link-editor-panel").classList.add("hidden");
            activeNode = null;
            document.getElementById("editor-panel").classList.add("hidden");
            render();
        });

        window.addEventListener("resize", () => {
            const c = viewportCenter();
            simulation.force("center").x(c.x).y(c.y);
            simulation.force("x").x(c.x);
            simulation.force("y").y(c.y);
            simulation.alpha(0.12).restart();
        });

        applyCanvasTheme(activeThemeId, { skipRender: true });
        render();
    </script>
</body>
</html>
